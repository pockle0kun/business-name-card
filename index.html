<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tomohiro Kubota | Digital Business Card</title>
<style>
  :root{
    --ink:#1d1f24;
    --sub:#82878f;
    --line:#ececee;
    --bg:#e9eaec;
    --card:#ffffff;
    --accent:#2e5b3c;
    --accent-dark:#234730;
    --accent-soft:#eef4ef;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:"Helvetica Neue",Arial,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",Meiryo,sans-serif;
    background:var(--bg);
    color:var(--ink);
    display:flex;
    justify-content:center;
    min-height:100vh;
    padding:24px 0 48px;
  }
  .phone{width:100%;max-width:400px;padding:0 16px;}

  /* ===== 名刺カード(日本名刺サイズ縦 55:91) ===== */
  .card{
    aspect-ratio:55/91;
    container-type:inline-size;
    background:var(--card);
    border-radius:3cqw;
    box-shadow:0 2px 10px rgba(0,0,0,.06);
    border-top:1.4cqw solid var(--accent);
    overflow:hidden;
  }
  .card-inner{
    width:100%;height:100%;
    padding:8cqw 8cqw 7.5cqw;
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    text-align:left;
  }
  .card-head{
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:8cqw;
  }
  .uni-logo{
    width:28cqw;height:28cqw;
    object-fit:contain;
  }
  .avatar{
    width:38cqw;height:38cqw;
    border-radius:50%;
    overflow:hidden;
    flex-shrink:0;
    background:var(--accent-soft);
    border:0.8cqw solid var(--accent-soft);
  }
  .avatar img{width:100%;height:100%;object-fit:cover;display:block;}

  .dept{font-size:3.5cqw;color:var(--sub);line-height:1.7;}
  .title{font-size:3.7cqw;color:var(--ink);margin-top:1cqw;line-height:1.55;}
  /* 余白は名前の前後に均等配置(margin:autoで吸収) */
  .name{
    font-size:8.5cqw;
    font-weight:600;
    letter-spacing:.05em;
    line-height:1.15;
    margin:auto 0;
    padding:3cqw 0;
  }
  .name .kana{
    display:block;
    font-size:3.3cqw;
    font-weight:400;
    color:var(--sub);
    letter-spacing:.18em;
    margin-top:1.6cqw;
  }
  /* 連絡先はカード下端のフッター */
  .contact{
    width:100%;
    border-top:1px solid var(--line);
    padding-top:3.5cqw;
    font-size:3.6cqw;
    color:var(--sub);
    line-height:1.95;
    text-align:left;
  }
  .contact a{color:inherit;text-decoration:none;}
  .contact .tag{
    display:inline-block;
    min-width:14cqw;
    font-size:2.9cqw;
    color:var(--accent);
    background:var(--accent-soft);
    border-radius:1.2cqw;
    padding:0.3cqw 1.6cqw;
    margin-right:2cqw;
    text-align:center;
    vertical-align:middle;
  }

  /* ===== カード外ボタン群 ===== */
  .action-btn{
    width:100%;
    margin-top:14px;
    background:var(--card);
    border:none;
    border-radius:10px;
    box-shadow:0 1px 6px rgba(0,0,0,.06);
    padding:14px 16px;
    font-family:inherit;
    font-size:15px;
    font-weight:600;
    color:var(--ink);
    display:flex;align-items:center;justify-content:center;gap:10px;
    cursor:pointer;
    text-decoration:none;
    transition:transform .12s ease;
  }
  .action-btn:active{transform:scale(.98);}
  .action-btn svg{width:20px;height:20px;color:var(--accent);flex-shrink:0;}
  .action-btn img{width:26px;height:26px;object-fit:contain;flex-shrink:0;}
  .action-btn .sub-label{
    display:block;
    font-size:10px;
    font-weight:400;
    color:var(--sub);
    margin-top:2px;
    letter-spacing:.04em;
  }
  .action-btn .labels{text-align:left;}

  /* ===== SNSアイコン ===== */
  .apps{
    margin-top:20px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:16px 8px;
  }
  .app{
    display:flex;flex-direction:column;align-items:center;gap:6px;
    text-decoration:none;color:var(--ink);
  }
  .app-icon{
    width:60px;height:60px;
    border-radius:14px;
    box-shadow:0 1px 5px rgba(0,0,0,.10);
    display:flex;align-items:center;justify-content:center;
    transition:transform .12s ease;
    overflow:hidden;
  }
  .app:active .app-icon{transform:scale(.94);}
  .app-icon svg{width:32px;height:32px;}
  .app-label{font-size:10.5px;color:#4b4f55;text-align:center;line-height:1.3;}

  /* ===== 言語切り替え ===== */
  .lang-switch{
    margin:28px auto 0;
    display:flex;
    width:fit-content;
    background:#dfe1e5;
    border-radius:999px;
    padding:4px;
  }
  .lang-switch button{
    border:none;
    background:transparent;
    font-family:inherit;
    font-size:13px;
    font-weight:600;
    color:#6b7078;
    padding:8px 22px;
    border-radius:999px;
    cursor:pointer;
    transition:background .15s ease,color .15s ease;
  }
  .lang-switch button.active{
    background:var(--accent);
    color:#fff;
  }

  .toast{
    position:fixed;left:50%;bottom:32px;
    transform:translateX(-50%) translateY(20px);
    background:rgba(29,31,36,.92);color:#fff;
    font-size:13px;padding:10px 18px;border-radius:999px;
    opacity:0;pointer-events:none;
    transition:opacity .25s ease,transform .25s ease;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media (prefers-reduced-motion: reduce){*{transition:none !important;}}
</style>
</head>

    const toast = document.getElementById("toast");
    toast.textContent = i18n[lang].toast;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2500);
  });

  setLang("en");
</script>
</body>
</html>
